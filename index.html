<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finland Flight Radar</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <!-- Floating Header -->
        <header>
            <div class="header-content">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="radar-icon">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="6"></circle>
                    <circle cx="12" cy="12" r="2"></circle>
                    <line x1="12" y1="12" x2="19.07" y2="4.93"></line>
                </svg>
                <h1>Finland Flight Radar</h1>
            </div>
            <div class="status">
                <span id="loading-indicator">Initializing...</span>
            </div>
        </header>

        <main>
            <!-- Leaflet Map Container -->
            <div id="map"></div>

            <!-- Flight Detail Sidebar (Glassmorphism) -->
            <aside id="sidebar" class="sidebar hidden">
                <button id="close-sidebar" class="close-btn">&times;</button>
                <div class="flight-details">
                    <h2 id="flight-callsign">Callsign</h2>
                    <div class="detail-row">
                        <span class="label">Origin Country</span>
                        <span id="flight-origin" class="value">Loading...</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Altitude</span>
                        <span id="flight-altitude" class="value">Loading...</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Velocity</span>
                        <span id="flight-velocity" class="value">Loading...</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">Heading</span>
                        <span id="flight-heading" class="value">Loading...</span>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Custom App JS -->
    <script src="app.js"></script>
</body>

</html>
